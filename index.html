<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Shopping System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Online Shopping System</h1>
    <nav>
        <button onclick="showSection('login')">Login</button>
        <button onclick="showSection('register')">Register</button>
        <button onclick="showSection('products')">Products</button>
        <button onclick="showSection('cart')">Cart</button>
    </nav>
</header>

<!-- LOGIN MODULE -->
<section id="login" class="section">
    <h2>Login</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
</section>

<!-- REGISTER MODULE -->
<section id="register" class="section">
    <h2>Register</h2>
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <input type="password" placeholder="Confirm Password">
    <button>Register</button>
</section>

<!-- PRODUCT MODULE -->
<section id="products" class="section">
    <h2>Products</h2>

    <div class="product">
        <h3>Smartphone</h3>
        <p>Price: ₹15,000</p>
        <button onclick="addToCart('Smartphone',15000)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Shoes</h3>
        <p>Price: ₹2,000</p>
        <button onclick="addToCart('Shoes',2000)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Headphones</h3>
        <p>Price: ₹3,000</p>
        <button onclick="addToCart('Headphones',3000)">Add to Cart</button>
    </div>
</section>

<!-- CART MODULE -->
<section id="cart" class="section">
    <h2>Cart</h2>
    <ul id="cartItems"></ul>
    <h3 id="totalPrice">Total: ₹0</h3>
    <button onclick="placeOrder()">Place Order</button>
</section>

<script src="script.js"></script>
</body>
</html>
